name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@11.1.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Test
        run: pnpm test

      - name: Build API
        run: pnpm build

      - name: Build frontend
        run: pnpm --filter client build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create app directory on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          connect_timeout: 60s
          script: mkdir -p "${{ vars.APP_PATH }}"

      - name: Clean app directory (preserve .env and node_modules)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          connect_timeout: 60s
          script: |
            find "${{ vars.APP_PATH }}" -mindepth 1 \
              -maxdepth 1 \
              ! -name ".env" \
              ! -name "node_modules" \
              -exec rm -rf {} +

      - name: Copy project files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: ${{ vars.APP_PATH }}
          overwrite: true
          strip_components: 0
          exclude: ".git,node_modules,dist,.env,client/node_modules,client/dist"

      - name: Install, build, migrate, and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          connect_timeout: 60s
          script: |
            set -e

            # Load nvm — SSH sessions don't source .bashrc/.profile
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd "${{ vars.APP_PATH }}"

            if [ ! -f .env ]; then
              echo ".env file is missing on the server."
              exit 1
            fi

            pnpm --version

            pnpm install --frozen-lockfile --prod=false
            pnpm migration:run
            pnpm build
            pnpm --filter client build

            if pm2 describe "${{ vars.APP_NAME }}" > /dev/null 2>&1; then
              pm2 restart "${{ vars.APP_NAME }}" --update-env
            else
              pm2 start pnpm --name "${{ vars.APP_NAME }}" -- start:prod
            fi
            pm2 save
